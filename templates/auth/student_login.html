{% extends 'base.html' %}
{% block title %}Student Login — CPDS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card border-0 shadow-lg rounded-4 p-4 my-5">
      <div class="text-center mb-4">
        <div class="auth-icon bg-primary text-white rounded-circle mx-auto mb-3">
          <i class="bi bi-person-badge fs-2"></i>
        </div>
        <h3 class="fw-bold">Student Login</h3>
        <p class="text-muted small">Access your placement portal</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="student@email.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center text-muted small mb-0">New student? <a href="{{ url_for('student_register') }}" class="fw-semibold text-primary">Register here</a></p>
    </div>
  </div>
</div>
{% endblock %}
